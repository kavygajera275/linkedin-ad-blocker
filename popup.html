<!DOCTYPE html>
<html>
<head>
    <title>LinkedIn Ad Blocker</title>

    <style>

        body {
            width: 240px;
            padding: 20px;
            font-family: Arial, sans-serif;
            text-align: center;
            background: #0a66c2;
            color: white;
            border-radius: 12px;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 70px;
            height: 36px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ff4d4d;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 28px;
            width: 28px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #00c853;
        }

        input:checked + .slider:before {
            transform: translateX(34px);
        }

        #status {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <h2>LinkedIn Ad Blocker</h2>

    <label class="switch">
        <input type="checkbox" id="toggleSwitch">
        <span class="slider"></span>
    </label>

    <div id="status">ON</div>

    <script src="popup.js"></script>

</body>
</html>
